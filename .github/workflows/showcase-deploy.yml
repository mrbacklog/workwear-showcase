name: Showcase Sync & Deploy

on:
  # Scheduled: every 4 hours
  schedule:
    - cron: '30 */4 * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full sync (skip change detection)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      code_only:
        description: 'Code-only deploy (skip sync, use cached data)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Trigger via API (repository_dispatch) from backend worker
  repository_dispatch:
    types: [showcase-sync]

jobs:
  sync-and-deploy:
    name: Sync & Deploy Showcase
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            public/data
            .r2-manifest.json
          key: showcase-data-v2-${{ github.sha }}
          restore-keys: |
            showcase-data-v2-

      - name: Sync product data from backend
        if: github.event.inputs.code_only != 'true'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          npx tsx scripts/sync-products.ts $FORCE_FLAG
        env:
          BACKEND_URL: https://api.databiz.app
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Check if data was synced
        id: check-data
        run: |
          if [ -f "public/data/model-cards-meta.json" ]; then
            MODEL_COUNT=$(node -e "const d=require('./public/data/model-cards-meta.json'); console.log(d.totalModels)")
            echo "models=$MODEL_COUNT" >> $GITHUB_OUTPUT
            echo "has_data=true" >> $GITHUB_OUTPUT
            echo "Synced $MODEL_COUNT models"
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "No data synced - skipping deploy"
          fi

      - name: Build showcase
        if: steps.check-data.outputs.has_data == 'true'
        run: npm run build

      - name: Verify file count under Cloudflare limit
        if: steps.check-data.outputs.has_data == 'true'
        run: |
          FILE_COUNT=$(find out -type f | wc -l)
          echo "Total files in out/: $FILE_COUNT"
          if [ "$FILE_COUNT" -gt 19500 ]; then
            echo "::error::File count ($FILE_COUNT) approaching Cloudflare Pages 20K limit!"
            exit 1
          fi
          echo "Images are served from R2 CDN (workwear-images.databiz.app), not from Pages"

      - name: Deploy to Cloudflare Pages
        if: steps.check-data.outputs.has_data == 'true'
        run: npx wrangler pages deploy out --project-name=workwear-showcase --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        if: always()
        run: |
          echo "### Showcase Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.code_only || 'false' }}" = "true" ]; then
            echo "- Mode: **Code-only** (sync skipped, cached data used)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.check-data.outputs.has_data }}" = "true" ]; then
            echo "- Models: **${{ steps.check-data.outputs.models }}**" >> $GITHUB_STEP_SUMMARY
            echo "- Images: **R2 CDN** (workwear-images.databiz.app)" >> $GITHUB_STEP_SUMMARY
            echo "- Status: Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: No data available, deploy skipped" >> $GITHUB_STEP_SUMMARY
          fi
